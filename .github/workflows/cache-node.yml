name: CI con Caché (pnpm + setup-node)

on:
    push:
        branches: [main]

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - name: 🔑 Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  version: "10"

            - name: ⚙️ Setup Node
              uses: actions/setup-node@v5
              with:
                  node-version: "20"
                  cache: "pnpm" # ← setup-node tiene caché integrado 🎉

            - name: 📦 Instalar dependencias
              run: pnpm install --frozen-lockfile # ci es más rápido que install en CI

            - name: 🧪 Tests
              run: pnpm test
