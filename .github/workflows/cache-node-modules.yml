name: CI con Caché node_modules

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: ⚙️ Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: 📦 Caché node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: nm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: ⬇️ Instalar solo si no hay caché
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: 🧪 Tests
        run: npm test
